
<!DOCTYPE html>
<html lang="el">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Credentials Module</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<script src="https://unpkg.com/dexie/dist/dexie.js"></script>

<style>

body{
background:#f4f6fa;
}

.card{
border-radius:16px;
}

.section-title{
font-weight:700;
font-size:22px;
}

.badge-type{
font-size:13px;
}

</style>

</head>
<body>

<div class="container py-4">

<div class="card shadow-sm p-4 mb-4">

<div class="d-flex justify-content-between align-items-center flex-wrap gap-3">

<div>
<h1 class="mb-1">Πτυχία & Πιστοποιήσεις</h1>
<p class="text-muted mb-0">
Medical Credentials / Certifications
</p>
</div>

<div>
<button class="btn btn-outline-primary" onclick="login()">

Login with Google

</button>

<button class="btn btn-outline-danger" onclick="logout()">

Logout

</button>

<div id="userBox"></div>
</div>

</div>

</div>


<div class="row">

<!-- ===================================================== -->
<!-- FORM -->
<!-- ===================================================== -->

<div class="col-lg-5 mb-4">

<div class="card shadow-sm p-4">

<h3 class="section-title mb-4">
Νέα Καταχώρηση
</h3>

<div class="mb-3">
<label class="form-label">
Είδος Πιστοποίησης
</label>

<select
id="credentialType"
class="form-select">

<option>Πτυχίο</option>
<option>Μεταπτυχιακό</option>
<option>Διδακτορικό</option>
<option>Ειδικότητα</option>
<option>Εξειδίκευση</option>
<option>Πιστοποίηση</option>
<option>Αγροτικό</option>
<option>Άδεια Άσκησης</option>
<option>Άλλο</option>

</select>

</div>

<div class="mb-3">
<label class="form-label">
Τίτλος
</label>

<input
id="title"
type="text"
class="form-control"
placeholder="π.χ. APLS Provider">
</div>

<div class="mb-3">
<label class="form-label">
Φορέας
</label>

<input
id="issuer"
type="text"
class="form-control"
placeholder="π.χ. ERC / ΕΚΠΑ">
</div>

<div class="mb-3">
<label class="form-label">
Ημερομηνία
</label>

<input
id="issueDate"
type="date"
class="form-control">
</div>

<div class="mb-3">
<label class="form-label">
Ημερομηνία Λήξης (προαιρετικό)
</label>

<input
id="expirationDate"
type="date"
class="form-control">
</div>

<div class="mb-3">
<label class="form-label">
Αρχείο PDF / JPEG
</label>

<input
id="attachment"
type="file"
class="form-control"
accept=".pdf,.jpg,.jpeg,.png">
</div>

<div class="mb-3">
<label class="form-label">
Περισσότερες Πληροφορίες
</label>

<textarea
id="notes"
class="form-control"
rows="4"
placeholder="Σχόλια, διάρκεια ισχύος, περιγραφή..."></textarea>
</div>

<div class="d-grid gap-2">

<button
onclick="saveCredential()"
class="btn btn-primary btn-lg">
Αποθήκευση
</button>

</div>

</div>

</div>


<!-- ===================================================== -->
<!-- LIST -->
<!-- ===================================================== -->

<div class="col-lg-7">

<div class="card shadow-sm p-4">

<div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4">

<h3 class="section-title mb-0">
Καταχωρήσεις
</h3>

<input
id="searchInput"
class="form-control w-auto"
placeholder="Αναζήτηση..."
onkeyup="loadCredentials()">

</div>

<div id="credentialsList"></div>

</div>

</div>

</div>

</div>


<script>

// =====================================================
// DATABASE
// =====================================================

const db = new Dexie("LogBookDB");


// VERSION 1

db.version(1).stores({

credentials:
"++id, certificationType, title, issuer, issueDate"

});


// =====================================================
// SAVE
// =====================================================

async function saveCredential(){

const fileInput =
document.getElementById("attachment");

const file =
fileInput.files[0] || null;

await db.credentials.add({

certificationType:
document.getElementById("credentialType").value,

title:
document.getElementById("title").value,

issuer:
document.getElementById("issuer").value,

issueDate:
document.getElementById("issueDate").value,

expirationDate:
document.getElementById("expirationDate").value,

notes:
document.getElementById("notes").value,

attachment:file,

createdAt:new Date().toISOString()

});

alert("Η καταχώρηση αποθηκεύτηκε");

clearForm();

loadCredentials();

}


// =====================================================
// LOAD
// =====================================================

async function loadCredentials(){

const search =
document.getElementById("searchInput")
.value
.toLowerCase();

const credentials =
await db.credentials.toArray();

let html = "";

credentials
.reverse()
.forEach(item => {

const combined = `
${item.title}
${item.issuer}
${item.certificationType}
${item.notes}
`
.toLowerCase();

if(!combined.includes(search)) return;

html += `

<div class="card border mb-3 p-3">

<div class="d-flex justify-content-between align-items-start flex-wrap gap-3">

<div>

<span class="badge bg-primary badge-type mb-2">
${item.certificationType}
</span>

<h5 class="mb-1">
${item.title || "Χωρίς τίτλο"}
</h5>

<div class="text-muted mb-2">
${item.issuer || ""}
</div>

<div>

<b>Ημερομηνία:</b>
${item.issueDate || "-"}

</div>

${item.expirationDate ? `
<div>
<b>Λήξη:</b>
${item.expirationDate}
</div>
` : ""}

</div>

<div>

<button
onclick="openAttachment(${item.id})"
class="btn btn-sm btn-success mb-2">
Άνοιγμα Αρχείου
</button>

<br>

<button
onclick="deleteCredential(${item.id})"
class="btn btn-sm btn-danger">
Διαγραφή
</button>

</div>

</div>

${item.notes ? `
<hr>
<p class="mb-0">
${item.notes}
</p>
` : ""}

</div>

`;

});

if(html === ""){

html = `
<div class="alert alert-secondary">
Δεν υπάρχουν καταχωρήσεις.
</div>
`;

}


document.getElementById("credentialsList")
.innerHTML = html;

}


// =====================================================
// OPEN FILE
// =====================================================

async function openAttachment(id){

const item =
await db.credentials.get(id);

if(!item.attachment){

alert("Δεν υπάρχει αρχείο");
return;

}

const url =
URL.createObjectURL(item.attachment);

window.open(url);

}


// =====================================================
// DELETE
// =====================================================

async function deleteCredential(id){

const confirmDelete =
confirm("Να διαγραφεί η καταχώρηση;");

if(!confirmDelete) return;

await db.credentials.delete(id);

loadCredentials();

}


// =====================================================
// CLEAR FORM
// =====================================================

function clearForm(){


document.getElementById("title").value = "";

document.getElementById("issuer").value = "";

document.getElementById("issueDate").value = "";

document.getElementById("expirationDate").value = "";

document.getElementById("notes").value = "";

document.getElementById("attachment").value = "";

}


// =====================================================
// INITIAL LOAD
// =====================================================

loadCredentials();

</script>
<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";

import {

getAuth,
GoogleAuthProvider,
signInWithPopup,
signOut,
onAuthStateChanged

}

from "https://www.gstatic.com/firebasejs/11.9.1/firebase-auth.js";
</script>
</body>
</html>
