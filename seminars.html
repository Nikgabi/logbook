<div class="tab-pane fade" id="seminars">

<div class="row">

<!-- ===================================================== -->
<!-- FORM -->
<!-- ===================================================== -->

<div class="col-lg-5 mb-4">

<div class="card shadow-sm p-4" id="seminarForm" style="display:none;">

<h3 class="section-title mb-4">Νέο Σεμινάριο</h3>

<!-- Τίτλος -->
<div class="mb-3">
<label class="form-label">Τίτλος</label>
<input id="semTitle" type="text" class="form-control" placeholder="π.χ. Βασικές Αρχές Στατιστικής Ανάλυσης">
</div>

<!-- Φορέας -->
<div class="mb-3">
<label class="form-label">Φορέας</label>
<input id="semOrganizer" type="text" class="form-control" placeholder="π.χ. Ελληνική Καρδιολογική Εταιρεία">
</div>

<!-- Είδος -->
<div class="mb-3">
<label class="form-label">Είδος</label>
<select id="semType" class="form-select">
<option value="" disabled selected>Επιλέξτε είδος</option>
<option>Δια ζώσης</option>
<option>Online</option>
<option>Hybrid</option>
</select>
</div>

<!-- Ημερομηνίες -->
<div class="row mb-3">
<div class="col">
<label class="form-label">Από</label>
<input id="semDateFrom" type="date" class="form-control">
</div>
<div class="col">
<label class="form-label">Έως</label>
<input id="semDateTo" type="date" class="form-control">
</div>
</div>

<!-- Credits -->
<div class="mb-3">
<label class="form-label">Credits <span class="text-muted">(CME/CPD)</span></label>
<input id="semCredits" type="number" min="0" step="0.5" class="form-control" placeholder="π.χ. 5">
</div>

<hr>

<!-- Ρόλος συμμετοχής -->
<h5 class="mb-3">Ρόλος Συμμετοχής</h5>

<div class="mb-3">
<div class="form-check mb-2">
<input class="form-check-input" type="checkbox" id="semAttendee">
<label class="form-check-label" for="semAttendee">Παρακολούθηση</label>
</div>
<div class="form-check mb-2">
<input class="form-check-input" type="checkbox" id="semTrainer">
<label class="form-check-label" for="semTrainer">Εκπαιδευτής</label>
</div>
<div class="form-check">
<input class="form-check-input" type="checkbox" id="semSpeaker">
<label class="form-check-label" for="semSpeaker">Ομιλητής</label>
</div>
</div>

<hr>

<!-- Περιγραφή -->
<div class="mb-3">
<label class="form-label">Περιγραφή</label>
<textarea id="semDescription" class="form-control" rows="3"
   placeholder="Σύντομη περιγραφή σεμιναρίου..."></textarea>
</div>

<!-- Πιστοποιητικό -->
<div class="mb-3">
<label class="form-label">Πιστοποιητικό</label>
<input id="semAttachment" type="file" class="form-control" accept=".pdf,.jpg,.jpeg,.png">
</div>

<div class="d-grid">
<button id="saveSeminarBtn" class="btn btn-primary btn-lg">Αποθήκευση</button>
</div>

</div>
</div>

<!-- ===================================================== -->
<!-- LIST -->
<!-- ===================================================== -->

<div class="col-lg-7">
<div class="card shadow-sm p-4">

<div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4">
<h3 class="section-title mb-0">Σεμινάρια</h3>
<input id="semSearchInput" class="form-control w-auto" placeholder="Αναζήτηση...">
</div>

<div id="seminarsList"></div>

</div>
</div>

</div>
</div>
