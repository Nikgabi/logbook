<div class="tab-pane fade" id="awards">

<div class="row">

<!-- ===================================================== -->
<!-- FORM -->
<!-- ===================================================== -->

<div class="col-lg-5 mb-4">

<div class="card shadow-sm p-4" id="awardsForm">

<h3 class="section-title mb-4">Νέο Βραβείο</h3>

<!-- Τίτλος -->
<div class="mb-3">
<label class="form-label">Τίτλος Βραβείου</label>
<input id="awardTitle" type="text" class="form-control" placeholder="π.χ. Βραβείο Καλύτερης Ανακοίνωσης">
</div>

<!-- Κατηγορία -->
<div class="mb-3">
<label class="form-label">Κατηγορία</label>
<select id="awardCategory" class="form-select">
<option value="" disabled selected>Επιλέξτε κατηγορία</option>
<option>Επιστημονικό</option>
<option>Ερευνητικό</option>
<option>Εκπαιδευτικό</option>
<option>Καλύτερη εργασία</option>
<option>Poster</option>
<option>Διάλεξη</option>
<option>Υποτροφία</option>
<option>Τιμητική διάκριση</option>
<option>Άλλο</option>
</select>
</div>

<!-- Φορέας / Συνέδριο -->
<div class="mb-3">
<label class="form-label">Φορέας / Συνέδριο</label>
<input id="awardOrganizer" type="text" class="form-control" placeholder="π.χ. Ελληνική Καρδιολογική Εταιρεία">
</div>

<!-- Ημερομηνία -->
<div class="mb-3">
<label class="form-label">Ημερομηνία</label>
<input id="awardDate" type="date" class="form-control">
</div>

<!-- Θέση -->
<div class="mb-3">
<label class="form-label">Θέση</label>
<select id="awardPosition" class="form-select">
<option value="" disabled selected>Επιλέξτε θέση</option>
<option>1ο</option>
<option>2ο</option>
<option>3ο</option>
<option>Τιμητικό</option>
<option>Άλλο</option>
</select>
</div>

<!-- Περιγραφή -->
<div class="mb-3">
<label class="form-label">Περιγραφή</label>
<textarea id="awardDescription" class="form-control" rows="3"
   placeholder="Σύντομη περιγραφή βραβείου..."></textarea>
</div>

<!-- Βεβαίωση -->
<div class="mb-3">
<label class="form-label">Βεβαίωση</label>
<input id="awardAttachment" type="file" class="form-control" accept=".pdf,.jpg,.jpeg,.png">
</div>

<div class="d-grid">
<button id="saveAwardBtn" class="btn btn-primary btn-lg">Αποθήκευση</button>
</div>

</div>
</div>

<!-- ===================================================== -->
<!-- LIST -->
<!-- ===================================================== -->

<div class="col-lg-7">
<div class="card shadow-sm p-4">

<div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4">
<h3 class="section-title mb-0">Βραβεία & Διακρίσεις</h3>
<input id="awardSearchInput" class="form-control w-auto" placeholder="Αναζήτηση...">
</div>

<div id="awardsList"></div>

</div>
</div>

</div>
</div>
