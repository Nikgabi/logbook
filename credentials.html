<div
    class="tab-pane fade show active"
    id="credentials">

     <!-- ===================================================== -->
<!-- FORM -->
<!-- ===================================================== -->
<div class="row">
<div class="col-lg-5 mb-4">

<div class="card shadow-sm p-4" id="formCard" style="display:none;">

<h3 class="section-title mb-4">
Νέα Καταχώρηση
</h3>

<div class="mb-3">
<label class="form-label">
Είδος Πιστοποίησης
</label>

<select
id="credentialType"
class="form-select">

<option>Πτυχίο</option>
<option>Μεταπτυχιακό</option>
<option>Διδακτορικό</option>
<option>Ειδικότητα</option>
<option>Εξειδίκευση</option>
<option>Πιστοποίηση</option>
<option>Αγροτικό</option>
<option>Άδεια Άσκησης</option>
<option>Άλλο</option>

</select>

</div>

<div class="mb-3">
<label class="form-label">
Τίτλος
</label>

<input
id="title"
type="text"
class="form-control"
placeholder="π.χ. APLS Provider">
</div>

<div class="mb-3">
<label class="form-label">
Φορέας
</label>

<input
id="issuer"
type="text"
class="form-control"
placeholder="π.χ. ERC / ΕΚΠΑ">
</div>

<div class="mb-3">
<label class="form-label">
Ημερομηνία
</label>

<input
id="issueDate"
type="date"
class="form-control">
</div>

<div class="mb-3">
<label class="form-label">
Ημερομηνία Λήξης (προαιρετικό)
</label>

<input
id="expirationDate"
type="date"
class="form-control">
</div>

<div class="mb-3">
<label class="form-label">
Αρχείο PDF / JPEG
</label>

<input
id="attachment"
type="file"
class="form-control"
accept=".pdf,.jpg,.jpeg,.png">
</div>

<div class="mb-3">
<label class="form-label">
Περισσότερες Πληροφορίες
</label>

<textarea
id="notes"
class="form-control"
rows="4"
placeholder="Σχόλια, διάρκεια ισχύος, περιγραφή..."></textarea>
</div>

<div class="d-grid gap-2">

<button
id="saveCredentials"
class="btn btn-primary btn-lg">
Αποθήκευση
</button>

</div>

</div>

</div>

  
  <!-- ===================================================== -->
<!-- LIST -->
<!-- ===================================================== -->

<div class="col-lg-7">

<div class="card shadow-sm p-4" >

<div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4">

<h3 class="section-title mb-0">
Καταχωρήσεις
</h3>

<input
id="searchInput"
class="form-control w-auto"
placeholder="Αναζήτηση..."
onkeyup="loadCredentials()">

</div>

<div id="credentialsList"></div>

</div>
</div>
</div>
</div>
