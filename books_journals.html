<!-- ===================================================== -->
<!-- ΒΙΒΛΙΑ -->
<!-- ===================================================== -->
<div class="tab-pane fade" id="books">
<div class="row">

<div class="col-lg-5 mb-4">
<div class="card shadow-sm p-4" id="bookForm">

<h3 class="section-title mb-4">Νέο Βιβλίο</h3>

<div class="mb-3">
<label class="form-label">Τίτλος</label>
<input id="bookTitle" type="text" class="form-control" placeholder="π.χ. Κλινική Καρδιολογία">
</div>

<div class="mb-3">
<label class="form-label">Εκδότης</label>
<input id="bookPublisher" type="text" class="form-control" placeholder="π.χ. Παρισιάνου, Springer">
</div>

<div class="mb-3">
<label class="form-label">ISBN</label>
<input id="bookISBN" type="text" class="form-control" placeholder="π.χ. 978-3-16-148410-0">
</div>

<div class="mb-3">
<label class="form-label">Ρόλος</label>
<select id="bookRole" class="form-select">
<option value="" disabled selected>Επιλέξτε ρόλο</option>
<option>Συγγραφέας</option>
<option>Συν-συγγραφέας</option>
<option>Επιμελητής</option>
<option>Μεταφραστής</option>
<option>Editor</option>
<option>Reviewer</option>
</select>
</div>

<div class="mb-3">
<label class="form-label">Κεφάλαια</label>
<textarea id="bookChapters" class="form-control" rows="3"
   placeholder="π.χ. Κεφ. 3: Αρρυθμίες, Κεφ. 7: Καρδιακή Ανεπάρκεια..."></textarea>
</div>

<div class="mb-3">
<label class="form-label">Σύνδεσμος <span class="text-muted">(προαιρετικό)</span></label>
<input id="bookUrl" type="url" class="form-control" placeholder="https://...">
</div>

<div class="d-grid">
<button id="saveBookBtn" class="btn btn-primary btn-lg">Αποθήκευση</button>
</div>

</div>
</div>

<div class="col-lg-7">
<div class="card shadow-sm p-4">
<div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4">
<h3 class="section-title mb-0">Βιβλία</h3>
<input id="bookSearchInput" class="form-control w-auto" placeholder="Αναζήτηση...">
</div>
<div id="booksList"></div>
</div>
</div>

</div>
</div>

<!-- ===================================================== -->
<!-- ΠΕΡΙΟΔΙΚΑ -->
<!-- ===================================================== -->
<div class="tab-pane fade" id="journals">
<div class="row">

<div class="col-lg-5 mb-4">
<div class="card shadow-sm p-4" id="journalForm">

<h3 class="section-title mb-4">Νέο Περιοδικό</h3>

<div class="mb-3">
<label class="form-label">Τίτλος</label>
<input id="journalTitle" type="text" class="form-control" placeholder="π.χ. European Heart Journal">
</div>

<div class="mb-3">
<label class="form-label">ISSN</label>
<input id="journalISSN" type="text" class="form-control" placeholder="π.χ. 0195-668X">
</div>

<div class="mb-3">
<label class="form-label">Εκδότης</label>
<input id="journalPublisher" type="text" class="form-control" placeholder="π.χ. Oxford University Press">
</div>

<div class="mb-3">
<label class="form-label">Ρόλος</label>
<select id="journalRole" class="form-select">
<option value="" disabled selected>Επιλέξτε ρόλο</option>
<option>Editor-in-Chief</option>
<option>Associate Editor</option>
<option>Section Editor</option>
<option>Reviewer</option>
<option>Editorial Board</option>
<option>Guest Editor</option>
</select>
</div>

<div class="row mb-2">
<div class="col">
<label class="form-label">Από</label>
<input id="journalDateFrom" type="date" class="form-control">
</div>
<div class="col">
<label class="form-label">Έως</label>
<input id="journalDateTo" type="date" class="form-control">
</div>
</div>

<div class="mb-3 form-check">
<input type="checkbox" class="form-check-input" id="journalActive"
   onchange="document.getElementById('journalDateTo').disabled = this.checked; if(this.checked) document.getElementById('journalDateTo').value='';">
<label class="form-check-label" for="journalActive">Ενεργό</label>
</div>

<div class="mb-3">
<label class="form-label">Website <span class="text-muted">(προαιρετικό)</span></label>
<input id="journalWebsite" type="url" class="form-control" placeholder="https://...">
</div>

<div class="d-grid">
<button id="saveJournalBtn" class="btn btn-primary btn-lg">Αποθήκευση</button>
</div>

</div>
</div>

<div class="col-lg-7">
<div class="card shadow-sm p-4">
<div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4">
<h3 class="section-title mb-0">Περιοδικά</h3>
<input id="journalSearchInput" class="form-control w-auto" placeholder="Αναζήτηση...">
</div>
<div id="journalsList"></div>
</div>
</div>

</div>
</div>
